<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      height: 100vh; 
      margin: 0;
      display: flex; 
      justify-content: center;
      align-items: center; 

    }
    .container {
      border: 1px solid #000;
      padding: 20px;
      width: 320px;
    }
    input, button {
      margin: 8px 0;
      padding: 5px;
      
    }
    button{
         background-color: rgb(9, 255, 95);
        border: none;
        border-radius: 5px;
        height: 41px;
       width: 157px;
    }
    input{
        width: 100%;
        height: 28px;
    }
    output {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      color: darkblue;
    }
    .info {
      margin-top: 15px;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>Simple Calculator</h3>
      <div class="info">
      <b>Name:</b> Yedhukrishna a.m <br>
      <b>Reg No:</b> NMAXSCS030
    </div><br>
    <label>Enter first number:</label><br>
    <input type="number" id="num1"><br>
    <label>Enter second number:</label><br>
    <input type="number" id="num2"><br>

    <button onclick="calculate('add')">Add</button>
    <button onclick="calculate('sub')">Subtract</button><br>
    <button onclick="calculate('mul')">Multiply</button>
    <button onclick="calculate('div')">Divide</button>

    <output id="result"></output>

  
  </div>

  <script>
    function calculate(op) {
      let n1 = parseFloat(document.getElementById("num1").value);
      let n2 = parseFloat(document.getElementById("num2").value);
      let res;


      switch(op) {
        case 'add': res = n1 + " + " + n2 + " = " + (n1 + n2); break;
        case 'sub': res = n1 + " - " + n2 + " = " + (n1 - n2); break;
        case 'mul': res = n1 + " * " + n2 + " = " + (n1 * n2); break;
        case 'div': 
          if (n2 === 0) {
            res = "Cannot divide by zero!";
          } else {
           res = n1 + " / " + n2 + " = " + (n1 / n2);
          }
          break;
      }

      document.getElementById("result").value = "Result: " + res;
    }
  </script>
</body>
</html>
