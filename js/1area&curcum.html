<!DOCTYPE html>
<html lang="en">
<head>
  <title>Circle Area and Circumference</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      height: 100vh; 
      margin: 0;
      display: flex; 
      justify-content: center;
      align-items: center; 
    }
    .container {
      max-width: 300px;
      padding: 15px;
      border: 1px solid #cccccc;
      border-radius: 5px;

    }
    input, button {
      margin-top: 10px;
      padding: 5px;
      width: 100%;
    }
    input{
        width: 285px;
    }
    button{
        background-color: rgb(9, 255, 95);
        border: none;
        border-radius: 5px;
        height: 50px;

    }
    
    .result {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Circle Calculator</h2>
    <p>Name: <b>Yedhukrishna a.m</b> <br> Reg:<b> NMAXSCS030</b></p>
    <p>To Calculate Area and Circumference of a Circle</p>
    <label for="radius">Enter Radius:</label>
    <input type="number" id="radius" placeholder="Enter radius">
    <button onclick="calculate()" >Calculate</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    function calculate() {
      let r = document.getElementById("radius").value;
      r = parseFloat(r);
      
      let area = Math.PI * r * r;
      let circumference = 2 * Math.PI * r;

      document.getElementById("result").innerHTML = 
        "Area: " + area.toFixed(2) + "<br>" +
        "Circumference: " + circumference.toFixed(2);
    }
  </script>
</body>
</html>
