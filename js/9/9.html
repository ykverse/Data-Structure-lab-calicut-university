<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Country Capital Display</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      border: 1px solid #000;
      padding: 20px;
      width: 320px;
      margin-top: 200px;
    }
    select, input {
      margin-top: 10px;
      padding: 6px;
      width: 95%;
    }
    .info {
      margin-top: 15px;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">

    <h3>Country & Capital</h3>
    <div class="info">
      <b>Name:</b> Yedhukrishna a.m <br>
      <b>Reg No:</b> NMAXSCS030
    </div><br>
    <label>Select a Country:</label><br>
    <select id="country" onchange="showCapital()">
      <option value="">--Select--</option>
      <option value="India">India</option>
      <option value="USA">USA</option>
      <option value="France">France</option>
      
    </select><br><br>
    
    <label>Capital:</label><br>
    <input type="text" id="capital" readonly>

    
  </div>

  <script>
    function showCapital() {
      let country = document.getElementById("country").value;
      let capitalBox = document.getElementById("capital");
      let capitals = {
        "India": "New Delhi",
        "USA": "Washington D.C.",
        "France": "Paris" 
      };
      
      capitalBox.value = capitals[country] || "";
    }
  </script>
</body>
</html>
